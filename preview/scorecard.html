<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:#fff;font-family:var(--wdl-font-sans)}.score{border:1px solid #DDE1E6;border-radius:8px;padding:16px;max-width:420px}.row{display:grid;grid-template-columns:1fr auto auto auto auto;gap:16px;align-items:center;padding:8px 0}.row + .row{border-top:1px solid #F2F4F8}.name{font:500 14px/1.2 var(--wdl-font-sans);letter-spacing:-0.03em;color:#121619}.seed{color:#697077;font-weight:400;margin-left:4px}.n{font-family:var(--wdl-font-mono);font-size:14px;color:#121619;text-align:center;width:22px}.n.win{color:#006633;font-weight:500}.live{display:inline-flex;align-items:center;gap:6px;font:500 11px/1 var(--wdl-font-sans);text-transform:uppercase;color:#22B263;letter-spacing:-0.03em;margin-bottom:8px}.live .dot{width:8px;height:8px;border-radius:50%;background:#22B263;box-shadow:0 0 0 4px rgba(34,178,99,.2)}.court{font:500 11px/1 var(--wdl-font-sans);text-transform:uppercase;color:#697077;letter-spacing:-0.03em;margin-bottom:8px}</style></head><body>
<div class="score">
  <div class="court">Centre Court · 2nd round</div>
  <div class="live"><span class="dot"></span>Live · Set 3</div>
  <div class="row"><span class="name">N. Djokovic <span class="seed">(2)</span></span><span class="n win">6</span><span class="n">4</span><span class="n win">6</span><span class="n">—</span></div>
  <div class="row"><span class="name">J. Sinner <span class="seed">(1)</span></span><span class="n">4</span><span class="n win">6</span><span class="n">3</span><span class="n">—</span></div>
</div>
</body></html>
