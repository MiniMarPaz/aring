<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:#fff}.row{display:flex;gap:10px;flex-wrap:wrap}.sw{width:140px;padding:12px;border-radius:6px;border:1px solid #DDE1E6;font:400 12px/1.3 var(--wdl-font-sans)}.dot{width:14px;height:14px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:6px}.sw b{display:block;font-weight:500;font-size:13px}.sw span{display:block;color:#697077;font-family:var(--wdl-font-mono);font-size:10px;margin-top:2px}h4{font:500 11px/1.2 var(--wdl-font-sans);text-transform:uppercase;margin:0 0 10px;color:#697077;letter-spacing:-0.03em}</style></head><body>
<h4>Support / semantic</h4>
<div class="row">
  <div class="sw"><span style="color:#DA1E28"><span class="dot" style="background:#DA1E28"></span></span><b>Error</b><span>#DA1E28</span></div>
  <div class="sw"><span style="color:#198038"><span class="dot" style="background:#198038"></span></span><b>Success</b><span>#198038</span></div>
  <div class="sw"><span style="color:#F1C21B"><span class="dot" style="background:#F1C21B"></span></span><b>Warning</b><span>#F1C21B</span></div>
  <div class="sw"><span style="color:#0043CE"><span class="dot" style="background:#0043CE"></span></span><b>Info</b><span>#0043CE</span></div>
</div>
</body></html>
